name: TikTok -> FB/IG (tiktok_fb_ig)

on:
  schedule:
    - cron: "30 13 * * *"  # 7:00 PM IST daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tiktok-fb-ig
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-requests-ytdlp

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install requests yt-dlp

      - name: Run pipeline
        env:
          FB_SYSTEM_USER_TOKEN: ${{ secrets.FB_SYSTEM_USER_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STATE_FILE: state.json
        run: python tiktok_fb_ig.py

      - name: Commit dedupe state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dedupe/
          git diff --staged --quiet || git commit -m "chore: update dedupe state [skip ci]"
          git pull --rebase
          git push
