name: FB Content Automation

on:
  schedule:
    - cron: '30 2 * * *'   # Photo #1 - 8:00 AM IST
    - cron: '30 12 * * *'  # Photo #2 - 6:00 PM IST
    - cron: '30 22 * * *'  # Video - 4:00 AM IST (next day)
  workflow_dispatch:
    inputs:
      task:
        description: 'Kya run karna hai'
        type: choice
        options: [photo, video, both]
        default: both

permissions:
  contents: write

jobs:
  post-photo:
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'photo' || inputs.task == 'both')) ||
      (github.event_name == 'schedule' && (github.event.schedule == '30 2 * * *' || github.event.schedule == '30 12 * * *'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure dedupe file exists
        run: touch used_photos.txt

      - name: Pick Random Search Term
        id: term
        run: |
          TERMS=("nature" "mountains" "waterfall" "forest" "beach" "sunset" "sunrise" "lake" "river" "valley" "desert" "islands" "countryside" "national park" "ocean" "wildlife" "canyon" "cliff" "snow mountains" "rainforest" "tropical beach" "coastline" "clouds sky" "hiking trail" "camping" "road trip" "scenic view" "landscape" "aurora" "savanna")
          echo "term=${TERMS[$((RANDOM % ${#TERMS[@]}))]}" >> "$GITHUB_OUTPUT"

      - name: Fetch Unused Photo from Pexels
        id: photo
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          QUERY: ${{ steps.term.outputs.term }}
        run: |
          set +e
          QUERY_ENC=$(jq -rn --arg q "$QUERY" '$q|@uri')

          match_topic() {
            local text_lower query_lower w w_root
            text_lower=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            query_lower=$(echo "$2" | tr '[:upper:]' '[:lower:]')
            for w in $query_lower; do
              w_root="${w%s}"
              if [[ "$text_lower" == *"$w"* || "$text_lower" == *"$w_root"* ]]; then
                return 0
              fi
            done
            return 1
          }

          FOUND=0
          for PAGE in 1 2 3 4 5; do
            RESPONSE=$(curl -s -H "Authorization: ${PEXELS_API_KEY}" \
              "https://api.pexels.com/v1/search?query=${QUERY_ENC}&per_page=20&page=${PAGE}")

            COUNT=$(echo "$RESPONSE" | jq '.photos | length' 2>/dev/null)
            if [ -z "$COUNT" ] || [ "$COUNT" == "null" ] || [ "$COUNT" -eq 0 ]; then
              continue
            fi

            for i in $(seq 0 $((COUNT - 1))); do
              PHOTO_ID=$(echo "$RESPONSE" | jq -r ".photos[$i].id")
              if grep -qx "$PHOTO_ID" used_photos.txt; then
                continue
              fi
              PHOTO_ALT=$(echo "$RESPONSE" | jq -r ".photos[$i].alt")
              if [ -z "$PHOTO_ALT" ] || [ "$PHOTO_ALT" == "null" ]; then
                PHOTO_ALT="$QUERY"
              fi
              if ! match_topic "$PHOTO_ALT" "$QUERY"; then
                echo "Skip $PHOTO_ID - alt '$PHOTO_ALT' topic se match nahi karta"
                continue
              fi
              IMAGE_URL=$(echo "$RESPONSE" | jq -r ".photos[$i].src.large2x")
              if [ -n "$IMAGE_URL" ] && [ "$IMAGE_URL" != "null" ]; then
                echo "photo_id=$PHOTO_ID" >> "$GITHUB_OUTPUT"
                echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"
                echo "photo_desc<<EOF" >> "$GITHUB_OUTPUT"
                echo "$PHOTO_ALT" >> "$GITHUB_OUTPUT"
                echo "EOF" >> "$GITHUB_OUTPUT"
                FOUND=1
                break 2
              fi
            done
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "No unused photo mila - skipping gracefully"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Photo
        if: steps.photo.outputs.found == 'true'
        run: curl -s -o photo.jpg "${{ steps.photo.outputs.image_url }}"

      - name: Generate Caption via Groq
        if: steps.photo.outputs.found == 'true'
        id: gencaption
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TERM: ${{ steps.term.outputs.term }}
          DESC: ${{ steps.photo.outputs.photo_desc }}
        run: |
          BODY=$(jq -n --arg desc "$DESC" --arg term "$TERM" '{
            model: "llama-3.3-70b-versatile",
            messages: [{role: "user", content: ("Write a social media post for a nature/travel photo. The actual photo shows: " + $desc + ". Base the caption specifically on this description (fall back to the general theme \"" + $term + "\" only if the description is too vague). Output STRICTLY in this format and nothing else: first line is exactly one short catchy sentence caption with no quotes, ending with a full stop, and containing exactly one relevant emoji placed naturally wherever it fits best in the sentence, then a blank line, then exactly 5 SEO-optimised hashtags separated by spaces each starting with hash symbol, using a mix of broad popular tags and niche specific tags for maximum reach. No extra text, no explanation.")}],
            temperature: 0.9
          }')

          RESPONSE=$(curl -s "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          CAPTION=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CAPTION" ] || [ "$CAPTION" == "null" ]; then
            CAPTION=$'Nature\'s beauty captured in a single frame. \xf0\x9f\x8c\xbf\n\n#Nature #Travel #EarthPixel #HiddenGem #WanderlustDaily'
          fi

          echo "caption<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CAPTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get Page Access Token
        if: steps.photo.outputs.found == 'true'
        id: page_token
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=access_token&access_token=${ACCESS_TOKEN}")
          PAGE_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$PAGE_TOKEN" == "null" ] || [ -z "$PAGE_TOKEN" ]; then
            echo "ERROR: Page token nahi mila"
            echo "page_token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$PAGE_TOKEN"
          echo "page_token=$PAGE_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Post Photo to Facebook Page
        if: steps.photo.outputs.found == 'true' && steps.page_token.outputs.page_token != ''
        id: postphoto
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_TOKEN: ${{ steps.page_token.outputs.page_token }}
        run: |
          RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v19.0/${PAGE_ID}/photos" \
            -F "source=@photo.jpg" \
            -F "caption=${{ steps.gencaption.outputs.caption }}" \
            -F "access_token=${PAGE_TOKEN}")
          echo "Post Response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.id' > /dev/null && echo "posted=true" >> "$GITHUB_OUTPUT" || echo "posted=false" >> "$GITHUB_OUTPUT"

      - name: Update Dedupe File
        if: steps.postphoto.outputs.posted == 'true'
        run: echo "${{ steps.photo.outputs.photo_id }}" >> used_photos.txt

      - name: Commit Dedupe File
        if: steps.postphoto.outputs.posted == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_photos.txt
          git commit -m "Update used photos list" || echo "No changes to commit"
          git push

      - name: Cleanup
        if: always()
        run: rm -f photo.jpg

  post-video:
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'video' || inputs.task == 'both')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-${{ runner.os }}-v1

      - name: Install ffmpeg (only if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure dedupe file exists
        run: touch used_videos.txt

      - name: Pick Random Search Term
        id: term
        run: |
          TERMS=("nature" "mountains" "waterfall" "forest" "beach" "sunset" "sunrise" "lake" "river" "valley" "desert" "islands" "countryside" "national park" "ocean" "wildlife" "canyon" "cliff" "snow mountains" "rainforest" "tropical beach" "coastline" "clouds sky" "hiking trail" "camping" "road trip" "scenic view" "landscape" "aurora" "savanna")
          echo "term=${TERMS[$((RANDOM % ${#TERMS[@]}))]}" >> "$GITHUB_OUTPUT"

      - name: Fetch Unused Portrait Video from Pexels
        id: video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          QUERY: ${{ steps.term.outputs.term }}
        run: |
          set +e
          QUERY_ENC=$(jq -rn --arg q "$QUERY" '$q|@uri')

          match_topic() {
            local text_lower query_lower w w_root
            text_lower=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            query_lower=$(echo "$2" | tr '[:upper:]' '[:lower:]')
            for w in $query_lower; do
              w_root="${w%s}"
              if [[ "$text_lower" == *"$w"* || "$text_lower" == *"$w_root"* ]]; then
                return 0
              fi
            done
            return 1
          }

          MIN_DUR=15
          MAX_DUR=25
          FOUND=0
          for PAGE in 1 2 3 4 5; do
            RESPONSE=$(curl -s -H "Authorization: ${PEXELS_API_KEY}" \
              "https://api.pexels.com/videos/search?query=${QUERY_ENC}&orientation=portrait&per_page=15&page=${PAGE}")

            COUNT=$(echo "$RESPONSE" | jq '.videos | length' 2>/dev/null)
            if [ -z "$COUNT" ] || [ "$COUNT" == "null" ] || [ "$COUNT" -eq 0 ]; then
              continue
            fi

            for i in $(seq 0 $((COUNT - 1))); do
              VIDEO_ID=$(echo "$RESPONSE" | jq -r ".videos[$i].id")
              if grep -qx "$VIDEO_ID" used_videos.txt; then
                continue
              fi

              DURATION=$(echo "$RESPONSE" | jq -r ".videos[$i].duration // empty")
              if [ -z "$DURATION" ] || [ "$DURATION" -lt "$MIN_DUR" ] || [ "$DURATION" -gt "$MAX_DUR" ]; then
                echo "Skip $VIDEO_ID - duration ${DURATION}s range (${MIN_DUR}-${MAX_DUR}s) se bahar"
                continue
              fi

              PAGE_URL=$(echo "$RESPONSE" | jq -r ".videos[$i].url // empty")
              SLUG=$(echo "$PAGE_URL" | sed -E 's#.*/video/##; s#/$##; s#-[0-9]+$##; s#-# #g')
              if [ -z "$SLUG" ]; then
                SLUG="$QUERY"
              fi
              if ! match_topic "$SLUG" "$QUERY"; then
                echo "Skip $VIDEO_ID - slug '$SLUG' topic se match nahi karta"
                continue
              fi

              VIDEO_URL=$(echo "$RESPONSE" | jq -r "[.videos[$i].video_files[] | select(.height > .width and .width <= 1080)] | sort_by(.width) | reverse | .[0].link // empty")

              if [ -z "$VIDEO_URL" ] || [ "$VIDEO_URL" == "null" ]; then
                VIDEO_URL=$(echo "$RESPONSE" | jq -r "[.videos[$i].video_files[] | select(.height > .width)] | .[0].link // empty")
              fi

              if [ -n "$VIDEO_URL" ] && [ "$VIDEO_URL" != "null" ]; then
                echo "video_id=$VIDEO_ID" >> "$GITHUB_OUTPUT"
                echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                echo "video_desc<<EOF" >> "$GITHUB_OUTPUT"
                echo "$SLUG" >> "$GITHUB_OUTPUT"
                echo "EOF" >> "$GITHUB_OUTPUT"
                FOUND=1
                break 2
              fi
            done
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "No portrait video mila - skipping gracefully"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Video
        if: steps.video.outputs.found == 'true'
        run: |
          curl -s -L -o video_raw.mp4 "${{ steps.video.outputs.video_url }}"
          ls -lh video_raw.mp4 || true

      - name: Compress Only if Near FB API Limit
        if: steps.video.outputs.found == 'true'
        run: |
          SIZE=$(stat -c%s video_raw.mp4)
          LIMIT=$((950 * 1024 * 1024))
          echo "Downloaded size: $SIZE bytes"

          if [ "$SIZE" -le "$LIMIT" ]; then
            echo "Under FB limit borderline, no compression needed"
            mv video_raw.mp4 video.mp4
          else
            echo "Over borderline, compressing to fit under FB limit..."
            DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 video_raw.mp4)
            DURATION=${DURATION%.*}
            if [ -z "$DURATION" ] || [ "$DURATION" -eq 0 ]; then DURATION=60; fi

            TARGET_KB=$((900 * 1024 * 8))
            BITRATE=$((TARGET_KB / DURATION))
            if [ "$BITRATE" -lt 500 ]; then BITRATE=500; fi

            ffmpeg -y -i video_raw.mp4 \
              -c:v libx264 -preset veryfast -b:v ${BITRATE}k -maxrate ${BITRATE}k -bufsize $((BITRATE*2))k \
              -vf "scale=min(1080\,iw):-2" \
              -c:a aac -b:a 128k \
              video.mp4 || mv video_raw.mp4 video.mp4

            ls -lh video.mp4 || true
          fi

      - name: Merge Random Background Music
        if: steps.video.outputs.found == 'true'
        run: |
          MUSIC=$(find audio -type f \( -iname "*.mp3" -o -iname "*.wav" -o -iname "*.m4a" \) | shuf -n 1)

          if [ -n "$MUSIC" ]; then
            echo "Using $MUSIC"
            ffmpeg -y \
              -i video.mp4 \
              -stream_loop -1 -i "$MUSIC" \
              -map 0:v:0 \
              -map 1:a:0 \
              -c:v copy \
              -c:a aac -b:a 192k \
              -shortest merged.mp4
            mv merged.mp4 video.mp4
          else
            echo "No audio found. Muting video."
            ffmpeg -y -i video.mp4 -c:v copy -an muted.mp4
            mv muted.mp4 video.mp4
          fi

      - name: Install Watermark Font
        if: steps.video.outputs.found == 'true'
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Add Text Watermark to Video
        if: steps.video.outputs.found == 'true'
        env:
          WATERMARK_TEXT: ${{ vars.WATERMARK_TEXT }}
        run: |
          TEXT="${WATERMARK_TEXT:-Nature Unfiltered}"
          ESCAPED_TEXT=$(printf '%s' "$TEXT" | sed "s/:/\\\\:/g; s/'/\\\\'/g")

          ffmpeg -y -i video.mp4 \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${ESCAPED_TEXT}':fontcolor=white@0.5:fontsize=h*0.02:borderw=2:bordercolor=black@0.4:x=(w-text_w)/2:y=h*0.74" \
            -c:a copy watermarked.mp4
          mv watermarked.mp4 video.mp4

      - name: Generate Caption via Groq
        if: steps.video.outputs.found == 'true'
        id: gencaption
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TERM: ${{ steps.term.outputs.term }}
          DESC: ${{ steps.video.outputs.video_desc }}
        run: |
          BODY=$(jq -n --arg desc "$DESC" --arg term "$TERM" '{
            model: "llama-3.3-70b-versatile",
            messages: [{role: "user", content: ("Write a social media post for a nature/travel video. The actual video shows: " + $desc + ". Base the caption specifically on this description (fall back to the general theme \"" + $term + "\" only if the description is too vague). Output STRICTLY in this format and nothing else: first line is exactly one short catchy sentence caption with no quotes, ending with a full stop, and containing exactly one relevant emoji placed naturally wherever it fits best in the sentence, then a blank line, then exactly 5 SEO-optimised hashtags separated by spaces each starting with hash symbol, using a mix of broad popular tags and niche specific tags for maximum reach. No extra text, no explanation.")}],
            temperature: 0.9
          }')

          RESPONSE=$(curl -s "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          CAPTION=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CAPTION" ] || [ "$CAPTION" == "null" ]; then
            CAPTION=$'Nature\'s beauty in motion. \xf0\x9f\x8e\xa5\n\n#Nature #Travel #ReelsDaily #ScenicView #WanderlustDaily'
          fi

          echo "caption<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CAPTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get Page Access Token
        if: steps.video.outputs.found == 'true'
        id: page_token
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=access_token&access_token=${ACCESS_TOKEN}")
          PAGE_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$PAGE_TOKEN" == "null" ] || [ -z "$PAGE_TOKEN" ]; then
            echo "ERROR: Page token nahi mila"
            echo "page_token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$PAGE_TOKEN"
          echo "page_token=$PAGE_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Post Video to Facebook Page
        if: steps.video.outputs.found == 'true' && steps.page_token.outputs.page_token != ''
        id: postvideo
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_TOKEN: ${{ steps.page_token.outputs.page_token }}
        run: |
          RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v19.0/${PAGE_ID}/videos" \
            -F "source=@video.mp4" \
            -F "description=${{ steps.gencaption.outputs.caption }}" \
            -F "access_token=${PAGE_TOKEN}")
          echo "Post Response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.id' > /dev/null && echo "posted=true" >> "$GITHUB_OUTPUT" || echo "posted=false" >> "$GITHUB_OUTPUT"

      - name: Update Dedupe File
        if: steps.postvideo.outputs.posted == 'true'
        run: echo "${{ steps.video.outputs.video_id }}" >> used_videos.txt

      - name: Commit Dedupe File
        if: steps.postvideo.outputs.posted == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_videos.txt
          git commit -m "Update used videos list" || echo "No changes to commit"
          git push

      - name: Cleanup
        if: always()
        run: rm -f video_raw.mp4 video.mp4
